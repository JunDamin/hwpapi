project:
  type: website
  # Only render the homepage + tutorials. Legacy API notebooks under
  # 02_api/ use nbdev `#| export` directives that break raw Quarto.
  render:
    - "index.qmd"
    - "01_tutorials/*.ipynb"
    - "02_api_reference.qmd"
    - "02_api/index.qmd"
    - "02_api/**/*.qmd"

format:
  html:
    theme: cosmo
    css: styles.css
    mainfont: "'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    monofont: "'JetBrains Mono', 'Fira Code', Consolas, 'Courier New', monospace"
    toc: true
    toc-depth: 3
    toc-location: right
    code-copy: true
    code-overflow: wrap
    code-block-bg: true
    code-block-border-left: "#2780E3"
    highlight-style: github
    fig-align: center
    anchor-sections: true
    smooth-scroll: true
    link-external-icon: true
    link-external-newwindow: true

website:
  title: "hwpapi"
  description: "한컴 오피스(HWP) 자동화를 Pythonic하게 — win32com 래퍼 파이썬 라이브러리"
  site-url: "https://JunDamin.github.io/hwpapi"
  favicon: favicon.svg
  twitter-card: true
  open-graph: true

  repo-url: "https://github.com/JunDamin/hwpapi"
  repo-branch: main
  repo-actions: [issue, source]

  navbar:
    background: primary
    search: true
    left:
      - text: "홈"
        file: index.qmd
      - text: "기초"
        menu:
          - text: "App 기초"
            file: 01_tutorials/01_app_basics.ipynb
          - text: "찾기와 바꾸기"
            file: 01_tutorials/02_find_and_replace.ipynb
          - text: "기능 둘러보기"
            file: 01_tutorials/03_feature_tour.ipynb
          - text: "다중 문서 다루기"
            file: 01_tutorials/08_multi_document.ipynb
      - text: "사용 사례"
        menu:
          - text: "회의록 자동 생성"
            file: 01_tutorials/04_usecase_meeting_minutes.ipynb
          - text: "폴더 내 일괄 편집"
            file: 01_tutorials/05_usecase_bulk_edit.ipynb
          - text: "데이터를 HWP 표로"
            file: 01_tutorials/06_usecase_data_to_table.ipynb
          - text: "실무형 보고서 생성"
            file: 01_tutorials/07_usecase_report_generation.ipynb
