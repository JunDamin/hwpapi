project:
  type: website
  # Legacy nbdev API notebooks with `#| export` directives break raw
  # Quarto rendering. Keep them around (they're referenced by sidebar.yml
  # for historical context) but don't let Quarto try to process them
  # directly.
  render:
    - "index.ipynb"
    - "01_tutorials/*.ipynb"

format:
  html:
    theme: darkly
    css: styles.css
    toc: true

website:
  twitter-card: true
  open-graph: true
  repo-actions: [issue]
  navbar:
    background: primary
    search: true
  sidebar:
    style: floating

metadata-files: [nbdev.yml, sidebar.yml]
