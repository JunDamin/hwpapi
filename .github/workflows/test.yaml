name: Tests

# hwpapi 는 Windows COM (pywin32 / winreg) 의존이므로 windows-latest
# 러너에서만 테스트 가능. Linux 우회 (winreg guard, fallback install) 를
# 시도하면 임시 fix 가 필수가 되어 유지보수가 어려움 — Windows 러너에서
# 실제 import 가 통과하는지 검증하는 것이 정공법.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run mock-based tests
        # 1,373+ 단위 테스트 (Mock 기반) — HWP 설치 불필요하지만
        # pywin32 / winreg import 는 정상 동작 (Windows 러너).
        # 실제 HWP COM 을 띄우는 smoke 테스트는 별도 (수동 / self-hosted).
        run: |
          python -m pytest tests/ -v --tb=short `
            --ignore=tests/test_all_actions.py `
            --ignore=tests/test_all_parametersets.py `
            --ignore=tests/smoke_features.py `
            --ignore=tests/smoke_scenarios.py `
            --ignore=tests/smoke_visual.py
        shell: pwsh

      - name: Import smoke test
        # v2 surface 검증 — 핵심 facade + 모듈 import.
        # (winreg / win32com 은 Windows runner 라 정상 import)
        run: |
          python -c "import hwpapi; print('hwpapi import OK, version =', hwpapi.__version__)"
          python -c "from hwpapi import App, Document; print('facade OK:', App.__name__, Document.__name__)"
          python -c "from hwpapi import units as U; print('units OK: 210mm =', U.mm(210), 'HWPUNIT')"
          python -c "from hwpapi.context import scopes; print('context.scopes OK')"
          python -c "from hwpapi.errors import HwpApiError; print('errors OK')"
          python -c "from hwpapi.low import actions, engine, parametersets; print('low layer OK')"
        shell: pwsh
