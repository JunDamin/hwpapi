name: Deploy to GitHub Pages

# Modern artifact-based Pages deploy (Node 24-compatible, supersedes the
# old `fastai/workflows/quarto-ghp@master` composite which pinned
# actions/checkout@v3 + actions/setup-python@v4 on Node 20 and was
# failing with `ModuleNotFoundError: No module named 'execnb.nbio'`).

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy, newer pushes cancel older in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Jupyter (Quarto needs it for .ipynb)
        run: pip install jupyter

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # Quarto rendering; _quarto.yml restricts which notebooks get
      # processed (legacy `#| export` API notebooks are excluded).
      - name: Render site
        working-directory: ./nbs
        run: quarto render --no-execute

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
