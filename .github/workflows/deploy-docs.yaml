name: Deploy docs to GitHub Pages

# Static-only deploy. hwpapi 는 Windows COM (win32com/winreg) 의존이라
# Linux runner 에서 quartodoc render 가 불가능. 대신 로컬 (Windows) 에서
# `cd docs && quarto render` 로 _site/ 를 빌드한 뒤 commit+push 하면
# 이 워크플로우가 그 정적 산출물만 GitHub Pages 에 업로드.
#
# 로컬 빌드 절차:
#   pip install -e ".[docs]"
#   cd docs
#   quartodoc build
#   quarto render
#   cd .. && git add docs/_site && git commit -m "docs(site): rebuild" && git push
#
# (`docs/_site/` 가 .gitignore 에 있다면 제외 규칙 해제 필요)

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

on:
  push:
    branches: [ "main", "master", "v2-redesign" ]
    paths:
      - "docs/_site/**"
      - ".github/workflows/deploy-docs.yaml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
