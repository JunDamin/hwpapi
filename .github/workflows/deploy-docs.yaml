name: Deploy docs to GitHub Pages

# Static-only deploy. hwpapi 는 Windows COM (win32com/winreg) 의존이라
# Linux runner 에서 quartodoc render 가 불가능. 대신 로컬 (Windows) 에서
# `cd docs && quarto render` 로 _site/ 를 빌드한 뒤 commit+push 하면
# 이 워크플로우가 그 정적 산출물만 GitHub Pages 에 업로드.
#
# 로컬 빌드 절차 (Windows + HWP 설치된 환경):
#   pip install -e ".[docs]"
#   pwsh docs/render-bilingual.ps1   # 또는 bash docs/render-bilingual.sh
#   git add docs/_site && git commit -m "docs(site): rebuild" && git push
#
# 양언어 모두 한 번에 render — 영문 (`docs/`) → 한국어 (`docs/ko/`)
# 순서가 중요. 헬퍼 스크립트가 그 순서를 보장.

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

on:
  push:
    branches: [ "main", "master", "v2-redesign" ]
    paths:
      - "docs/_site/**"
      - ".github/workflows/deploy-docs.yaml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify bilingual artifact
        # 두 언어 모두 존재하는지 확인 — 한쪽이 누락되면 deploy 거부
        run: |
          set -e
          test -f docs/_site/index.html       || { echo "::error::English index missing"; exit 1; }
          test -f docs/_site/ko/index.html    || { echo "::error::Korean index missing"; exit 1; }
          test -d docs/_site/reference        || { echo "::error::English reference dir missing"; exit 1; }
          test -d docs/_site/ko/reference     || { echo "::error::Korean reference dir missing"; exit 1; }
          en_pages=$(find docs/_site -maxdepth 3 -name "*.html" -not -path "*/ko/*" | wc -l)
          ko_pages=$(find docs/_site/ko -maxdepth 3 -name "*.html" | wc -l)
          echo "English pages: $en_pages"
          echo "Korean  pages: $ko_pages"
          if [ "$en_pages" -lt 30 ]; then echo "::error::English page count too low ($en_pages)"; exit 1; fi
          if [ "$ko_pages" -lt 30 ]; then echo "::error::Korean page count too low ($ko_pages)"; exit 1; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
