project:
  type: website
  output-dir: ../_site/ko
  preview:
    port: 4201
    browser: false

lang: ko

website:
  title: "hwpapi"
  description: "HWP (한컴오피스 한글) 자동화 — 슬림한 App facade, dict 형 컬렉션, raw action escape hatch."
  site-url: https://JunDamin.github.io/hwpapi/ko
  repo-url: https://github.com/JunDamin/hwpapi
  repo-actions: [edit, issue]
  page-navigation: true
  back-to-top-navigation: true
  search:
    location: navbar
    type: overlay
  navbar:
    background: primary
    pinned: true
    logo: ../_assets/logo.png
    left:
      - text: 홈
        file: index.qmd
      - text: 시작하기
        file: getting-started/install.qmd
      - text: 가이드
        file: guide/app-and-document.qmd
      - text: 레시피
        file: recipes/index.qmd
      - text: 레퍼런스
        file: reference/index.qmd
      - text: 디자인
        file: design/index.qmd
    right:
      - text: "🇬🇧 English"
        href: ../index.html
      - icon: github
        href: https://github.com/JunDamin/hwpapi
        aria-label: GitHub
  sidebar:
    - title: "시작하기"
      style: docked
      align: left
      contents:
        - getting-started/install.qmd
        - getting-started/quickstart.qmd
        - getting-started/migration-v1-to-v2.qmd
        - getting-started/migration-v2-to-v3.qmd
    - title: "가이드"
      style: docked
      align: left
      contents:
        - guide/app-and-document.qmd
        - guide/collections.qmd
        - guide/elements.qmd
        - guide/context-scopes.qmd
        - guide/units.qmd
        - guide/low-level-escape-hatch.qmd
    - title: "레시피"
      style: docked
      align: left
      contents:
        - recipes/index.qmd
        - recipes/quickstart-tour.qmd
        - recipes/find-replace.qmd
        - recipes/fill-fields.qmd
        - recipes/charshape-formatting.qmd
        - recipes/mail-merge.qmd
        - recipes/bulk-edit.qmd
        - recipes/data-to-table.qmd
        - recipes/report-generation.qmd
        - recipes/export-formats.qmd
        - recipes/insert-picture.qmd
        - recipes/batch-processing.qmd
        - recipes/headers-and-footers.qmd
        - recipes/presets-gallery.qmd
        - recipes/debugging-tools.qmd
    - title: "레퍼런스"
      style: docked
      align: left
      contents:
        - reference/index.qmd
        - auto: "reference"
    - title: "디자인"
      style: docked
      align: left
      contents:
        - design/index.qmd
        - design/architecture.qmd
        - section: "ADRs"
          contents:
            - design/adr/adr-001-v2-redesign.qmd
            - design/adr/adr-002-quarto-docs.qmd
            - design/adr/adr-003-multi-document.qmd
            - design/adr/adr-004-element-api.qmd
            - design/adr/adr-005-api-ergonomics.qmd
            - design/adr/adr-006-python-docx-patterns.qmd
  page-footer:
    left: "hwpapi v3.0 · HWP COM 자동화 Python 라이브러리"
    right:
      - text: "GitHub"
        href: https://github.com/JunDamin/hwpapi
      - text: "PyPI"
        href: https://pypi.org/project/hwpapi/

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: ../_assets/styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    code-copy: true
    code-overflow: wrap
    code-block-bg: true
    code-block-border-left: "#4582EC"
    highlight-style: github
    link-external-newwindow: true
    anchor-sections: true
    smooth-scroll: true

execute:
  freeze: auto
  echo: true
  warning: false
  error: false
